name: Build and Push Docker Image

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/my-cni-plugin

jobs:
  build-and-push:
    runs-on: my-runner
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=$(echo $GITHUB_SHA | head -c7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache,mode=max

  update-manifests:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout home-kubernetes
        uses: actions/checkout@v4
        with:
          repository: tryuuu/home-kubernetes
          token: ${{ secrets.HOME_K8S_TOKEN }}

      - name: Update image tag
        run: |
          sed -i "s/^  tag: .*/  tag: ${{ needs.build-and-push.outputs.image_tag }}/" helm/my-cni/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/my-cni/values.yaml
          git commit -m "chore: update my-cni image tag to ${{ needs.build-and-push.outputs.image_tag }}"
          git push
